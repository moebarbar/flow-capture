<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowCapture</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>FlowCapture</h1>
    </div>

    <div id="not-recording" class="state-panel">
      <p class="description">Click the button below to start capturing your workflow</p>
      <button id="start-btn" class="btn btn-primary" data-testid="button-start-recording">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
          <circle cx="12" cy="12" r="4" fill="currentColor"/>
        </svg>
        Start Recording
      </button>
      <div class="divider">
        <span>or</span>
      </div>
      <button id="element-capture-btn" class="btn btn-element-capture" data-testid="button-element-capture">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
          <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
          <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
          <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
        </svg>
        Capture Element
      </button>
      <div class="color-picker-section">
        <label for="border-color">Border Color</label>
        <div class="color-picker-row">
          <input type="color" id="border-color" value="#ef4444" data-testid="input-border-color">
          <div class="color-presets">
            <button class="color-preset" data-color="#ef4444" style="background: #ef4444;" data-testid="preset-red"></button>
            <button class="color-preset" data-color="#22c55e" style="background: #22c55e;" data-testid="preset-green"></button>
            <button class="color-preset" data-color="#3b82f6" style="background: #3b82f6;" data-testid="preset-blue"></button>
            <button class="color-preset" data-color="#f59e0b" style="background: #f59e0b;" data-testid="preset-orange"></button>
            <button class="color-preset" data-color="#8b5cf6" style="background: #8b5cf6;" data-testid="preset-purple"></button>
          </div>
        </div>
      </div>
    </div>

    <div id="recording" class="state-panel hidden">
      <div class="recording-indicator">
        <span class="pulse"></span>
        <span>Recording...</span>
      </div>
      <div class="step-counter">
        <span id="step-count">0</span>
        <span class="label">steps captured</span>
      </div>
      <div class="recording-actions">
        <button id="capture-element-during-recording" class="btn btn-element-capture-small" data-testid="button-capture-element-during-recording">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
            <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
            <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
            <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
          </svg>
          Capture Element
        </button>
      </div>
      <button id="stop-btn" class="btn btn-danger" data-testid="button-stop-recording">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>
        </svg>
        Stop Recording
      </button>
    </div>

    <div id="sync-panel" class="state-panel hidden">
      <p class="section-title">Save your workflow</p>
      
      <div class="form-group">
        <label for="guide-title">Guide Title (optional)</label>
        <input type="text" id="guide-title" placeholder="My Workflow Guide" data-testid="input-guide-title">
      </div>

      <div class="form-group">
        <label for="workspace-select">Select Workspace</label>
        <select id="workspace-select" data-testid="select-workspace">
          <option value="">Loading workspaces...</option>
        </select>
      </div>

      <div id="sync-status" class="sync-status"></div>

      <button id="sync-btn" class="btn btn-primary" data-testid="button-sync">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M21 3V9H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Sync to Dashboard
      </button>

      <button id="skip-sync-btn" class="btn btn-secondary" data-testid="button-skip-sync">
        Skip for now
      </button>
    </div>

    <div id="finished" class="state-panel hidden">
      <div class="success-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
          <path d="M8 12L11 15L16 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="success-message">Workflow captured!</p>
      <div class="step-summary">
        <span id="final-step-count">0</span> steps recorded
      </div>
      <div class="button-group">
        <button id="view-btn" class="btn btn-secondary" data-testid="button-view-guide">View Guide</button>
        <button id="new-btn" class="btn btn-primary" data-testid="button-new-recording">New Recording</button>
      </div>
    </div>

    <div class="footer">
      <a href="#" id="open-dashboard" data-testid="link-open-dashboard">Open Dashboard</a>
      <span class="separator">|</span>
      <a href="#" id="settings-link" data-testid="link-settings">Settings</a>
    </div>

    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <h3>Settings</h3>
        <div class="form-group">
          <label for="api-url">Dashboard URL</label>
          <input type="text" id="api-url" placeholder="https://your-app.replit.app" data-testid="input-api-url">
          <p class="hint">Enter your FlowCapture dashboard URL</p>
        </div>
        <div class="button-group">
          <button id="cancel-settings" class="btn btn-secondary">Cancel</button>
          <button id="save-settings" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
