<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowCapture - Select Tab to Capture</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      max-width: 600px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      padding: 24px;
      border-bottom: 1px solid #e5e7eb;
      text-align: center;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      color: #6b7280;
    }

    .tab-list {
      max-height: 400px;
      overflow-y: auto;
      padding: 12px;
    }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 8px;
    }

    .tab-item:hover {
      background: #f3f4f6;
    }

    .tab-item:active {
      background: #e5e7eb;
      transform: scale(0.98);
    }

    .tab-favicon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      object-fit: contain;
      background: #f3f4f6;
      flex-shrink: 0;
    }

    .tab-favicon-placeholder {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      flex-shrink: 0;
    }

    .tab-info {
      flex: 1;
      min-width: 0;
    }

    .tab-title {
      font-size: 14px;
      font-weight: 500;
      color: #1f2937;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-description {
      font-size: 12px;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .tab-active-badge {
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 10px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tab-loading, .tab-empty, .tab-error {
      padding: 40px 20px;
      text-align: center;
      color: #6b7280;
    }

    .tab-error {
      color: #dc2626;
    }

    .footer {
      padding: 16px 24px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: center;
    }

    .cancel-btn {
      padding: 10px 24px;
      border: 1px solid #d1d5db;
      background: white;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .cancel-btn:hover {
      background: #f9fafb;
      border-color: #9ca3af;
    }

    .permission-warning {
      background: #fef3c7;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      padding: 16px;
      margin: 12px;
      text-align: center;
    }

    .permission-warning p {
      color: #92400e;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .permission-btn {
      background: #f59e0b;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .permission-btn:hover {
      background: #d97706;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .loading-spinner {
      animation: pulse 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Select a Tab to Capture</h1>
      <p>Choose which browser tab you want to record</p>
    </div>
    
    <div id="permission-warning" class="permission-warning" style="display: none;">
      <p>FlowCapture needs permission to capture on websites. Click below to grant access.</p>
      <button id="grant-permission-btn" class="permission-btn" data-testid="button-grant-permission">
        Grant Permission
      </button>
    </div>
    
    <div class="tab-list" id="tab-list" data-testid="list-available-tabs">
      <div class="tab-loading loading-spinner">Loading available tabs...</div>
    </div>
    
    <div class="footer">
      <button id="cancel-btn" class="cancel-btn" data-testid="button-cancel-tab-selector">
        Cancel
      </button>
    </div>
  </div>
  
  <script src="tab-selector.js"></script>
</body>
</html>
